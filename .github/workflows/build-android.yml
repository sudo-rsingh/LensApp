name: Build & Test Android

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type (debug or release)
        required: false
        default: release
        type: choice
        options: [debug, release]

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'release' }} APK
    runs-on: ubuntu-latest

    env:
      # User-writable path avoids tar permission errors when restoring the cache.
      # Both vars must point to the same place — Gradle errors if they differ.
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_ROOT: /home/runner/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache node_modules directly — faster than re-running npm ci on every build
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Cache SDK in a user-writable home path so tar can restore permissions.
      # Keyed on build.gradle so bumping compileSdkVersion/buildToolsVersion
      # automatically invalidates the cache and installs the new versions.
      - name: Cache Android SDK components
        id: cache-android-sdk
        uses: actions/cache@v4
        with:
          path: /home/runner/android-sdk
          key: android-sdk-${{ hashFiles('android/build.gradle') }}

      - name: Install Android SDK components
        if: steps.cache-android-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      # Gradle cache must be restored before the build, not after
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle') }}
          restore-keys: gradle-

      - name: Run JS tests
        run: npx jest src/__tests__ --no-coverage

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        working-directory: android
        run: |
          BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }}
          # Always build debug for E2E; build the requested type for the artifact
          TASKS="assembleDebug assembleAndroidTest"
          if [ "$BUILD_TYPE" != "debug" ]; then
            TASKS="$TASKS assemble$(echo "${BUILD_TYPE^}")"
          fi
          ./gradlew $TASKS --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LensApp-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/${{ github.event.inputs.build_type || 'release' }}/*.apk
          retention-days: 30

      # Upload the debug APK so the e2e job can download it without rebuilding
      - name: Upload debug APK for E2E
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  e2e:
    name: E2E Tests (Detox)
    runs-on: ubuntu-latest
    needs: build
    # Only run on push/PR — skip for manual dispatch where build_type may be release-only
    if: github.event_name != 'workflow_dispatch'

    env:
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_ROOT: /home/runner/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Android SDK components
        id: cache-android-sdk
        uses: actions/cache@v4
        with:
          path: /home/runner/android-sdk
          key: android-sdk-${{ hashFiles('android/build.gradle') }}

      - name: Install Android SDK components
        if: steps.cache-android-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platforms;android-35" "build-tools;35.0.0" "platform-tools" \
            "system-images;android-34;google_apis;x86_64" "emulator"

      - name: Create AVD
        run: |
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name Pixel_6_API_34 \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6" \
            --force

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug

      - name: Run Detox E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_API_34
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: npx detox test --configuration android.emu.debug --headless --record-logs failing

      - name: Upload Detox logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-logs-${{ github.run_number }}
          path: artifacts/
          retention-days: 7
