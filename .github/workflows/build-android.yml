name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type (debug or release)
        required: false
        default: release
        type: choice
        options: [debug, release]

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'release' }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache node_modules directly — faster than re-running npm ci on every build
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Cache the downloaded Android SDK platforms and build-tools (~500 MB).
      # Keyed on build.gradle so bumping compileSdkVersion or buildToolsVersion
      # automatically invalidates the cache and installs the new versions.
      - name: Cache Android SDK components
        id: cache-android-sdk
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/platforms
            /usr/local/lib/android/sdk/build-tools
          key: android-sdk-${{ hashFiles('android/build.gradle') }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        if: steps.cache-android-sdk.outputs.cache-hit != 'true'
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      # Gradle cache must be restored before the build, not after
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        working-directory: android
        run: |
          BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }}
          ./gradlew assemble$(echo "${BUILD_TYPE^}") --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LensApp-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/${{ github.event.inputs.build_type || 'release' }}/*.apk
          retention-days: 30
