name: Build Android

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type (debug or release)
        required: false
        default: release
        type: choice
        options: [debug, release]

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'release' }} APK
    runs-on: ubuntu-latest

    env:
      # User-writable path avoids tar permission errors when restoring the cache.
      # Both vars must point to the same place — Gradle errors if they differ.
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_ROOT: /home/runner/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Cache SDK in a user-writable home path so tar can restore permissions.
      # Keyed on build.gradle so bumping compileSdkVersion/buildToolsVersion
      # automatically invalidates the cache and installs the new versions.
      - name: Cache Android SDK components
        id: cache-android-sdk
        uses: actions/cache@v5
        with:
          path: /home/runner/android-sdk
          key: android-sdk-${{ hashFiles('android/build.gradle') }}

      - name: Install Android SDK components
        if: steps.cache-android-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle') }}
          restore-keys: gradle-

      - name: Run JS tests
        run: npx jest src/__tests__ --no-coverage

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        working-directory: android
        run: ./gradlew assemble$(echo "${BUILD_TYPE^}") --no-daemon
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: LensApp-${{ github.event.inputs.build_type || 'release' }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/${{ github.event.inputs.build_type || 'release' }}/*.apk
          retention-days: 30

      # Upload both APKs so the e2e job can run without rebuilding
      - name: Upload debug APKs for E2E
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug
            android/app/build/outputs/apk/androidTest
          retention-days: 1

  e2e:
    name: E2E Tests (Detox)
    runs-on: ubuntu-latest
    needs: build
    # Only run on push/PR — skip for manual dispatch where build_type may be release-only
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Let android-actions/setup-android handle the base SDK (sets ANDROID_HOME
      # to the system path which sdkmanager and avdmanager both understand).
      # We don't cache here — E2E runs less often and the system image is large.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download debug APKs
        uses: actions/download-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk

      # reactivecircus/android-emulator-runner installs the system image,
      # creates the AVD, and starts the emulator — we don't do any of that manually.
      - name: Run Detox E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: Pixel_6_API_34
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb logcat -c
            adb logcat -v time *:E &
            LOGCAT_PID=$!
            npx detox test --configuration android.emu.debug --headless --record-logs failing
            EXIT_CODE=$?
            kill $LOGCAT_PID 2>/dev/null || true
            exit $EXIT_CODE

      - name: Upload Detox logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-logs-${{ github.run_number }}
          path: artifacts/
          retention-days: 7
